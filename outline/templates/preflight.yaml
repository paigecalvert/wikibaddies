apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Release.Name }}-preflight-config"
  labels:
    troubleshoot.sh/kind: preflight
    {{- include "outline.labels" . | nindent 4 }}
stringData:
  preflight.yaml: |
    apiVersion: troubleshoot.sh/v1beta2
    kind: Preflight
    metadata:
      name: {{ include "outline.fullname" . }}-preflight
    spec:
      collectors:
        - clusterResources: {}
        {{- if not .Values.postgresql.enabled }}
        - postgres:
            collectorName: external-postgresql
            uri: "postgres://{{ include "outline.postgresql.username" . }}:{{ .Values.externalPostgresql.password }}@{{ .Values.externalPostgresql.host }}:{{ include "outline.postgresql.port" . }}/{{ include "outline.postgresql.database" . }}"
        {{- end }}
        {{- if not .Values.redis.enabled }}
        - redis:
            collectorName: external-redis
            uri: "redis://{{ .Values.externalRedis.username | default "default" }}:{{ .Values.externalRedis.password }}@{{ .Values.externalRedis.host }}:{{ include "outline.redis.port" . }}"
        {{- end }}

      analyzers:
        - clusterVersion:
            checkName: Kubernetes Version
            outcomes:
              - fail:
                  when: "< 1.23.0"
                  message: |
                    Outline requires Kubernetes 1.23.0 or later. Your cluster does not meet this
                    requirement. Please upgrade your cluster before installing.
              - pass:
                  message: "Kubernetes version meets the minimum requirement of 1.23.0."

        - nodeResources:
            checkName: Schedulable Nodes
            outcomes:
              - fail:
                  when: "count() < 1"
                  message: |
                    No nodes were found in the cluster. All pods will be unschedulable.
                    Check for node taints, cordoned nodes, or cluster provisioning issues.
              - pass:
                  when: "count() >= 1"
                  message: "At least one node is available for scheduling."

        - nodeResources:
            checkName: Node Memory
            outcomes:
              - fail:
                  when: "min(memoryCapacity) < 2Gi"
                  message: |
                    At least one node has less than 2Gi of memory. Outline and its embedded
                    dependencies (PostgreSQL, Redis, MinIO) require a minimum of 2Gi per node
                    to schedule successfully. Add more memory or use a larger node type.
              - warn:
                  when: "min(memoryCapacity) < 4Gi"
                  message: |
                    At least one node has less than 4Gi of memory. Outline and its embedded
                    dependencies run best with 4Gi or more per node. Consider using a larger
                    node type to avoid resource contention.
              - pass:
                  message: "Node memory meets the recommended requirement of 4Gi."
        {{- if or .Values.postgresql.enabled .Values.redis.enabled .Values.minio.enabled }}

        - storageClass:
            checkName: Default Storage Class
            outcomes:
              - fail:
                  message: |
                    No default StorageClass was found in the cluster. Outline's embedded
                    PostgreSQL, Redis, and MinIO components require a default StorageClass
                    to provision PersistentVolumes. Install a StorageClass and mark it as
                    default before installing Outline.
              - pass:
                  message: "Default StorageClass is available."
        {{- end }}
        {{- if .Values.ingress.enabled }}

        - ingressClass:
            checkName: Ingress Class
            {{- if .Values.ingress.className }}
            ingressClassName: {{ .Values.ingress.className }}
            {{- end }}
            outcomes:
              - fail:
                  message: |
                    {{- if .Values.ingress.className }}
                    IngressClass '{{ .Values.ingress.className }}' was not found in the cluster.
                    Ensure an ingress controller that provides this class is installed.
                    {{- else }}
                    No default IngressClass was found in the cluster. Outline is configured
                    with ingress enabled. Install an ingress controller (such as ingress-nginx)
                    and ensure it is set as the default IngressClass, or set ingress.className
                    to the name of an existing IngressClass.
                    {{- end }}
              - pass:
                  message: |
                    {{- if .Values.ingress.className }}
                    IngressClass '{{ .Values.ingress.className }}' is available.
                    {{- else }}
                    Default IngressClass is available.
                    {{- end }}
        {{- end }}
        {{- if not .Values.postgresql.enabled }}

        - postgres:
            checkName: External PostgreSQL Connectivity
            collectorName: external-postgresql
            outcomes:
              - fail:
                  when: "connected == false"
                  message: |
                    Cannot connect to PostgreSQL at {{ .Values.externalPostgresql.host }}:{{ include "outline.postgresql.port" . }}.
                    Verify that:
                      - The hostname is correct and resolvable from within the cluster
                      - The username '{{ include "outline.postgresql.username" . }}' exists and has access to the '{{ include "outline.postgresql.database" . }}' database
                      - The password provided in externalPostgresql.password is correct
                      - PostgreSQL is running and accepting connections on port {{ include "outline.postgresql.port" . }}
              - pass:
                  when: "connected == true"
                  message: "Successfully connected to external PostgreSQL at {{ .Values.externalPostgresql.host }}."
              - warn:
                  message: "PostgreSQL connectivity returned an unexpected result. Check the preflight collector logs for details."
        {{- end }}
        {{- if not .Values.redis.enabled }}

        - redis:
            checkName: External Redis Connectivity
            collectorName: external-redis
            outcomes:
              - fail:
                  when: "connected == false"
                  message: |
                    Cannot connect to Redis at {{ .Values.externalRedis.host }}:{{ include "outline.redis.port" . }}.
                    Verify that:
                      - The host is reachable from the cluster
                      - The password provided in externalRedis.password is correct
                      - The Redis instance is running and accepting connections on port {{ include "outline.redis.port" . }}
              - pass:
                  when: "connected == true"
                  message: "Successfully connected to external Redis at {{ .Values.externalRedis.host }}."
              - warn:
                  message: "Redis connectivity returned an unexpected result. Check the preflight collector logs for details."
        {{- end }}
