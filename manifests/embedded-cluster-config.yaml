apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
metadata:
  name: outline
spec:
  version: "3.0.0-alpha-31+k8s-1.34"
  extensions:
    helmCharts:
      - chart:
          name: cert-manager
          chartVersion: "v1.16.3"
        releaseName: cert-manager
        namespace: cert-manager
        weight: -1
        values:
          crds:
            enabled: true
      - chart:
          name: ingress-nginx
          chartVersion: "4.11.3"
        releaseName: ingress-nginx
        namespace: ingress-nginx
        # image registry rewriting (ReplicatedImageRegistry/Repository) omitted:
        # the linter does not support these KOTS runtime functions at lint time.
        values:
          controller:
            service:
              type: NodePort
              nodePorts:
                http: "80"
                https: "443"
